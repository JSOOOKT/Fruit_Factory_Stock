name: fruit_factory_stock
description: A mobile-first app for recording stock in/out of raw materials in a fruit preservation factory using voice entry.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.14.0

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.6

  # Navigation
  go_router: ^13.0.0

  # UI
  flutter_screenutil: ^5.9.0
  fl_chart: ^0.68.0
  google_fonts: ^6.0.0

  # Voice Input
  speech_to_text: ^6.6.0

  # Localization
  intl: ^0.20.2

  # Utilities
  shared_preferences: ^2.2.0
  uuid: ^4.0.0
  logger: ^2.0.0
  connectivity_plus: ^6.0.0
  url_launcher: ^6.2.5

   # Export
  excel: ^4.0.0
  pdf: ^3.11.0
  printing: ^5.13.0
  share_plus: ^10.0.0
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  custom_lint: ^0.5.1

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/icons/
    - assets/images/